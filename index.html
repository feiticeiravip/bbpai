<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banca Brasileira BR</title>

  <meta name="description" content="Banca Brasileira BR - Plataforma online rápida e segura."/>
  <meta name="theme-color" content="#0f172a"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      background:#000;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    /* TOPO */
    .topo{
      width:100%;
      height:45px;
      background:#0f172a;
      border-bottom:2px solid #16a34a;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .topo h1{
      color:#fff;
      font-size:17px;
      font-weight:700;
      letter-spacing:1px;
    }

    /* IFRAME */
    .iframe-area{
      flex:1;
      width:100%;
      overflow:hidden;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:#fff;
    }

    /* RODAPÉ */
    .rodape{
      width:100%;
      height:65px;
      background:#0f172a;
      border-top:2px solid #16a34a;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      flex-shrink:0;
    }

    .suporte-btn{
      width:100%;
      max-width:400px;
      height:45px;
      background:#16a34a;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:15px;
      font-weight:700;
      transition:0.2s;
    }

    .suporte-btn:hover{
      transform:scale(1.02);
      background:#15803d;
    }

    .whatsapp-icon{
      width:22px;
      height:22px;
      fill:white;
    }
  </style>
</head>
<body>

  <!-- TOPO -->
  <div class="topo">
    <h1>BANCA BRASILEIRA BR</h1>
  </div>

  <!-- IFRAME -->
  <div class="iframe-area">
    <iframe
      src="https://app.bancabrasileira.com.br/pr/kNCaMqXJ"
      allow="
        clipboard-read;
        clipboard-write;
        autoplay;
        fullscreen;
        geolocation;
        microphone;
        camera;
        payment;
        usb;
        web-share
      "
      sandbox="
        allow-same-origin
        allow-scripts
        allow-forms
        allow-popups
        allow-modals
        allow-downloads
        allow-presentation
        allow-top-navigation
        allow-top-navigation-by-user-activation
      "
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <!-- RODAPÉ -->
  <div class="rodape">
    <a
      class="suporte-btn"
      href="https://wa.me/558393389383?text=Preciso%20de%20ajudo%20na%20Banca%20Brasileira!"
      target="_blank">

      <svg class="whatsapp-icon" viewBox="0 0 32 32">

      </svg>

      CHAMAR SUPORTE
    </a>
  </div>

</body>
</html>
