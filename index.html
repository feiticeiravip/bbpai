<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banca Brasileira BR</title>

  <meta name="description" content="Banca Brasileira BR - Plataforma online rápida e segura."/>
  <meta name="theme-color" content="#0f172a"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    .topo{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:60px;
      background:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      border-bottom:2px solid #16a34a;
    }

    .topo h1{
      color:#fff;
      font-size:22px;
      font-weight:700;
      letter-spacing:1px;
    }

    iframe{
      position:absolute;
      top:60px;
      left:0;
      width:100%;
      height:calc(100% - 60px);
      border:none;

      /* Permissões */
      allowfullscreen:true;
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>BANCA BRASILEIRA BR</h1>
  </div>

  <iframe
    src="https://app.bancabrasileira.com.br/pr/kNCaMqXJ"
    allow="
      clipboard-read;
      clipboard-write;
      autoplay;
      fullscreen;
      geolocation;
      microphone;
      camera;
      payment;
      usb;
      web-share
    "
    sandbox="
      allow-same-origin
      allow-scripts
      allow-forms
      allow-popups
      allow-modals
      allow-downloads
      allow-presentation
      allow-top-navigation
      allow-top-navigation-by-user-activation
    "
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>

</body>
</html>
